services:
  # --- Master Node ---
  master:
    build:
      context: .
      args:
        EXAMPLE: wordcount
    container_name: shard-master
    # The master listens on 1234 and processes shakespeare.txt with 8 reduce tasks
    command: ["./app", "-mode", "master", "-port", "1234", "-reduce", "8", "data/shakespeare.txt"]
    ports:
      - "1234:1234"
    networks:
      - shard-net

  # --- Worker Nodes (x3) ---
  worker:
    build:
      context: .
      args:
        EXAMPLE: wordcount
    deploy:
      replicas: 3
    depends_on:
      - master
    # Workers listen on port 80 (internal) and connect to 'master:1234'
    command: ["./app", "-mode", "worker", "-port", "80", "-master", "master:1234"]
    networks:
      - shard-net

networks:
  shard-net:
    driver: bridge
